<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Big Brother</title>
    <!-- Tailwind CSS CDN for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Deep Discord Dark Theme overrides */
      body {
        background-color: #313338;
        color: #dbdee1;
      }
      .discord-card {
        background-color: #2b2d31;
        transition: all 0.2s ease-in-out;
      }
      .discord-card:hover {
        background-color: #3f4147;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col font-sans">
    <!-- Navbar -->
    <nav class="bg-[#1E1F22] shadow-md border-b border-[#1E1F22]">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-3">
            <svg
              class="w-8 h-8 text-indigo-400"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6zm4 4h-2v-2h2v2zm0-4h-2V7h2v6z"
              />
            </svg>
            <span class="font-bold text-xl tracking-wide text-white"
              >Big Brother</span
            >
          </div>
          <div
            class="flex items-center space-x-6 text-sm font-medium"
            id="header-stats"
          >
            <!-- Stats injected via JS -->
            <span class="text-gray-400">Loading DB...</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Tracked Users</h1>
        <p class="text-gray-400">
          Click on a user profile to view their complete recorded history.
        </p>
      </div>

      <!-- User Grid -->
      <div
        id="user-grid"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
      >
        <!-- User cards injected via JS -->
      </div>
    </main>

    <script>
      // Fetch global stats
      fetch("/api/stats")
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("header-stats").innerHTML = `
                    <div class="flex items-center space-x-2 bg-[#2B2D31] px-3 py-1.5 rounded-md">
                        <span class="text-indigo-400 font-bold">${data.tracked_users}</span>
                        <span class="text-gray-400">Users</span>
                    </div>
                    <div class="flex items-center space-x-2 bg-[#2B2D31] px-3 py-1.5 rounded-md">
                        <span class="text-green-400 font-bold">${data.logged_activities}</span>
                        <span class="text-gray-400">Activities</span>
                    </div>
                    <div class="flex items-center space-x-2 bg-[#2B2D31] px-3 py-1.5 rounded-md">
                        <span class="text-blue-400 font-bold">${data.logged_voice_sessions}</span>
                        <span class="text-gray-400">Voice Sessions</span>
                    </div>
                `;
        });

      // Fetch users and populate grid
      fetch("/api/users")
        .then((res) => res.json())
        .then((users) => {
          const grid = document.getElementById("user-grid");
          grid.innerHTML = ""; // clear loading

          if (users.length === 0) {
            grid.innerHTML =
              '<p class="col-span-full text-center text-gray-500 mt-10">No users found in database yet.</p>';
            return;
          }

          // Sort users: Humans first, then Bots
          users.sort((a, b) => {
            if (a.bot === b.bot) return 0;
            return a.bot ? 1 : -1;
          });

          users.forEach((user) => {
            const avatarUrl =
              user.avatar_url ||
              "https://cdn.discordapp.com/embed/avatars/0.png";
            const displayName = user.global_name || user.name;
            const userName = user.global_name ? `@${user.name}` : "";

            // Determine Status Color
            let statusColor = "bg-gray-500"; // Offline default
            if (user.raw_status === "online") statusColor = "bg-green-500";
            else if (user.raw_status === "idle") statusColor = "bg-yellow-500";
            else if (user.raw_status === "dnd") statusColor = "bg-red-500";

            const card = document.createElement("a");
            card.href = `/user/${user.user_id}`;
            card.className =
              "discord-card rounded-xl p-5 shadow-lg flex flex-col items-center justify-center text-center cursor-pointer border border-[#1E1F22]";

            card.innerHTML = `
                        <div class="relative mb-4">
                            <img src="${avatarUrl}" class="w-20 h-20 rounded-full object-cover border-4 border-[#1E1F22] shadow-sm">
                            <div class="absolute bottom-0 right-0 w-5 h-5 bg-[#2B2D31] rounded-full flex items-center justify-center">
                                ${user.bot ? '<span class="text-[10px] bg-indigo-500 text-white px-1 rounded font-bold">BOT</span>' : `<div class="w-3.5 h-3.5 ${statusColor} rounded-full border-2 border-[#2B2D31]"></div>`}
                            </div>
                        </div>
                        <h2 class="text-lg font-bold text-white truncate w-full">${displayName}</h2>
                        <p class="text-sm text-gray-400 truncate w-full">${userName}</p>
                    `;
            grid.appendChild(card);
          });
        })
        .catch((err) => {
          console.error("Failed to load users", err);
          document.getElementById("user-grid").innerHTML =
            '<p class="text-red-400">Error connecting to database.</p>';
        });
    </script>
  </body>
</html>
